  const goals = [
    { key: 'all', label: 'All research goals' },
    { key: 'performance', label: 'Performance & muscle' },
    { key: 'fat-loss', label: 'Fat loss & metabolism' },
    { key: 'recovery', label: 'Recovery & injury' },
    { key: 'sleep-stress', label: 'Sleep, stress & mood' },
    { key: 'focus', label: 'Focus & brain health' },
    { key: 'longevity', label: 'Longevity & aging' },

  const goalMap = { fat_loss: 'fat-loss', muscle_growth: 'performance', recovery: 'recovery', cognitive: 'focus', anti_aging: 'longevity', sleep: 'sleep-stress' };

  const filtered = PEPTIDE_DATA.filter(p => {
    const goalMatch = activeGoal === 'all' || p.goals.some(g => goalMap[g.toLowerCase().replace(' ', '_')] === activeGoal || p.goals.join('').toLowerCase().includes(activeGoal.split('-')[0]));
    const searchMatch = !search || p.name.toLowerCase().includes(search.toLowerCase()) || p.shortDescription.toLowerCase().includes(search.toLowerCase());

        <div style={{ background: '#fff', border: '1px solid #e2e8f0', borderRadius: 22, padding: '14px 18px', marginBottom: 14, display: 'flex', gap: 20, alignItems: 'center', justifyContent: 'space-between' }}>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            {goals.map(g => (
              <button key={g.key} onClick={() => setActiveGoal(g.key)} style={{ padding: '5px 12px', borderRadius: 9999, fontSize: 12, fontWeight: 500, border: `1px solid ${activeGoal === g.key ? '#103b2c' : '#e2e8f0'}`, background: activeGoal === g.key ? '#103b2c' : '#fff', color: activeGoal === g.key ? '#fff' : '#475569', cursor: 'pointer', transition: 'all 150ms' }}>{g.label}</button>
            ))}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
            <div style={{ position: 'relative' }}>
              <svg style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)' }} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search compounds" style={{ height: 36, paddingLeft: 30, paddingRight: 12, border: '1px solid #e2e8f0', borderRadius: 9999, fontSize: 12, background: '#f8fafc', outline: 'none', width: 200 }} />
            </div>
          </div>
        </div>

        <p style={{ fontSize: 13, color: '#64748b', marginBottom: 16 }}>{filtered.length} peptide{filtered.length !== 1 ? 's' : ''} · {goals.find(g => g.key === activeGoal)?.label}</p>

        {/* Grid */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 20 }}>
          {filtered.map(p => (
            <PeptideCard key={p.slug} peptide={p} onCompare={toggleCompare} isCompared={compareSlugs.includes(p.slug)} canCompare={compareSlugs.length < 4} />
          ))}
        </div>

        {filtered.length === 0 && (
          <div style={{ textAlign: 'center', padding: '60px 20px', color: '#94a3b8' }}>
            <p style={{ fontSize: 15, margin: 0 }}>No peptides match your filters.</p>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── STACK BUILDER SCREEN ─────────────────────────────────────────────────────
function StackBuilderScreen({ onNavigate }) {
  const [stack, setStack] = React.useState([
    { name: 'BPC-157', category: 'tissue_repair', dose: '250mcg', freq: 'Twice daily', compatibility: 'ok' },

  ]);
  const [showAdd, setShowAdd] = React.useState(false);

  const available = PEPTIDE_DATA.filter(p => !stack.find(s => s.name === p.name));

  function removeFromStack(name) { setStack(s => s.filter(p => p.name !== name)); }
  function addToStack(p) {
    setStack(s => [...s, { name: p.name, category: p.category, dose: '—', freq: '—', compatibility: 'ok' }]);
    setShowAdd(false);

                <div style={{ flex: 1, minWidth: 0 }}>

          {/* Compatibility alert */}

            <div style={{ background: '#fffbeb', border: '1px solid #fde047', borderRadius: 12, padding: '10px 14px', marginBottom: 12, display: 'flex', gap: 10 }}>
              <svg style={{ flexShrink: 0, marginTop: 1 }} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#d97706" strokeWidth="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>

              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                <span style={{ fontSize: 12, color: '#64748b' }}>Compatibility</span>
                <span style={{ fontSize: 12, fontWeight: 600, color: '#16a34a' }}>✓ All clear</span>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                <span style={{ fontSize: 12, color: '#64748b' }}>Est. monthly cost</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: '#0f172a' }}>$140–$280</span>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                <span style={{ fontSize: 12, color: '#64748b' }}>Risk tier</span>
                <span style={{ fontSize: 12, fontWeight: 600, color: '#d97706' }}>Medium-High</span>
              </div>
            </div>
            <button style={{ width: '100%', padding: '10px', borderRadius: 10, background: 'oklch(0.52 0.11 164)', color: '#fff', fontWeight: 700, fontSize: 13, border: 'none', cursor: 'pointer', marginBottom: 8 }}>Save Stack</button>
            <button style={{ width: '100%', padding: '10px', borderRadius: 10, background: '#f8fafc', color: '#334155', fontWeight: 600, fontSize: 13, border: '1px solid #e2e8f0', cursor: 'pointer' }}>Share Stack</button>
          </div>

          {/* Compatibility rules */}
          <div style={{ background: '#fff', border: '1px solid #e2e8f0', borderRadius: 16, padding: 20 }}>
            <p style={{ fontFamily: 'ui-monospace,monospace', fontSize: 9, letterSpacing: '0.18em', textTransform: 'uppercase', color: '#94a3b8', margin: '0 0 14px' }}>COMPATIBILITY RULES</p>
            {[
              { pair: 'BPC-157 + TB-500', status: 'Synergistic', color: '#16a34a', bg: '#f0fdf4', border: '#bbf7d0' },
              { pair: 'Tissue Repair + GH axis', status: 'Use caution', color: '#d97706', bg: '#fffbeb', border: '#fde047' },
              { pair: 'IGF-1 + Insulin', status: 'Blocked', color: '#dc2626', bg: '#fef2f2', border: '#fca5a5' },
            ].map(r => (
              <div key={r.pair} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 10px', borderRadius: 9, background: r.bg, border: `1px solid ${r.border}`, marginBottom: 6 }}>
                <span style={{ fontSize: 11, color: '#334155' }}>{r.pair}</span>
                <span style={{ fontSize: 11, fontWeight: 700, color: r.color }}>{r.status}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const stored = (() => { try { return localStorage.getItem('pp_page') || 'home'; } catch { return 'home'; } })();
  const [page, setPage] = React.useState(stored);
  const [quizDone, setQuizDone] = React.useState(false);

  function navigate(p) {
    setPage(p);
    try { localStorage.setItem('pp_page', p); } catch {}
    window.scrollTo(0, 0);
  }

  function handleQuizComplete() { setQuizDone(true); navigate('quiz-result'); }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
      <Header currentPage={page} onNavigate={navigate} />
      <main style={{ flex: 1 }}>
        {page === 'home' && <HeroSection onNavigate={navigate} />}
        {page === 'peptides' && <PeptidesScreen onNavigate={navigate} />}
        {page === 'quiz' && <QuizFlow onComplete={handleQuizComplete} />}
        {page === 'quiz-result' && <QuizResultScreen onNavigate={navigate} />}
        {page === 'stack-builder' && <StackBuilderScreen onNavigate={navigate} />}
        {!['home','peptides','quiz','quiz-result','stack-builder'].includes(page) && (
          <div style={{ textAlign: 'center', padding: '80px 24px' }}>
            <p style={{ fontSize: 32, marginBottom: 8 }}>🔬</p>
            <h2 style={{ fontSize: 22, fontWeight: 700, color: '#0f172a', marginBottom: 8 }}>Coming in this UI kit</h2>
            <p style={{ fontSize: 14, color: '#64748b', marginBottom: 24 }}>The <strong>{page}</strong> screen is planned but not yet built.</p>
            <button onClick={() => navigate('home')} style={{ padding: '8px 22px', borderRadius: 9, background: 'oklch(0.52 0.11 164)', color: '#fff', fontWeight: 600, fontSize: 13, border: 'none', cursor: 'pointer' }}>← Back to Home</button>
          </div>
        )}
      </main>
      <Footer onNavigate={navigate} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
