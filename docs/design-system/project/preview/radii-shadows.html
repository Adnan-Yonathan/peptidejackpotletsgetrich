<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Manrope', sans-serif; background: #fff; padding: 16px 20px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 12px; }
  .cell { background: #f8f8f8; border-radius: 6px; padding: 8px 6px; text-align: center; }
  .cell-val { font-size: 11px; font-weight: 700; color: #0f172a; }
  .cell-name { font-size: 9px; color: #999; margin-top: 2px; }
  .swatch { height: 28px; border-radius: 4px; margin-bottom: 4px; }
  .section-title { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #aaa; margin-bottom: 6px; }
  .shadow-row { display: flex; gap: 10px; }
  .shadow-card { flex: 1; background: #fff; border-radius: 10px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: #555; }
</style>
</head>
<body>
  <p class="section-title">Border Radius Scale</p>
  <div class="grid">
    <div class="cell"><div class="swatch" style="background: #103b2c; border-radius: 4px;"></div><div class="cell-val">4px</div><div class="cell-name">xs · badge inner</div></div>
    <div class="cell"><div class="swatch" style="background: #103b2c; border-radius: 6px;"></div><div class="cell-val">6px</div><div class="cell-name">sm</div></div>
    <div class="cell"><div class="swatch" style="background: #103b2c; border-radius: 8px;"></div><div class="cell-val">8px</div><div class="cell-name">md</div></div>
    <div class="cell"><div class="swatch" style="background: #0f6a52; border-radius: 10px;"></div><div class="cell-val">10px</div><div class="cell-name">lg · btn</div></div>
    <div class="cell"><div class="swatch" style="background: #0f6a52; border-radius: 14px;"></div><div class="cell-val">14px</div><div class="cell-name">xl · card</div></div>
    <div class="cell"><div class="swatch" style="background: #0f6a52; border-radius: 9999px;"></div><div class="cell-val">full</div><div class="cell-name">badge · pill</div></div>
  </div>
  <p class="section-title">Shadow Scale</p>
  <div class="shadow-row">
    <div class="shadow-card" style="box-shadow: 0 1px 2px rgb(0 0 0/0.05); border: 1px solid #f0f0f0;">sm</div>
    <div class="shadow-card" style="box-shadow: 0 4px 6px -1px rgb(0 0 0/0.07), 0 2px 4px -2px rgb(0 0 0/0.05);">md · hover</div>
    <div class="shadow-card" style="box-shadow: 0 10px 15px -3px rgb(0 0 0/0.07);">lg</div>
    <div class="shadow-card" style="box-shadow: 0 28px 60px -20px rgba(15,23,42,0.35);">hero panel</div>
  </div>
</body>
</html>
