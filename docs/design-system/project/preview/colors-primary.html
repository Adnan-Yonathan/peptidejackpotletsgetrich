<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Manrope', system-ui, sans-serif; background: #fff; padding: 20px; }
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap');
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  .swatch { flex: 1; height: 56px; border-radius: 8px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 8px; }
  .label { font-size: 10px; font-weight: 600; letter-spacing: 0.02em; }
  .val { font-size: 9px; opacity: 0.7; margin-top: 1px; }
  .swatch.light .label, .swatch.light .val { color: #103b2c; }
  .swatch.dark .label, .swatch.dark .val { color: #e7f4ee; }
  .section-title { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #666; margin-bottom: 6px; }
</style>
</head>
<body>
<p class="section-title">Primary Palette</p>
<div class="row">
  <div class="swatch dark" style="background: #103b2c;">
    <span class="label">Brand Dark</span>
    <span class="val">#103b2c</span>
  </div>
  <div class="swatch dark" style="background: oklch(0.52 0.11 164);">
    <span class="label">Primary</span>
    <span class="val">oklch(0.52 0.11 164)</span>
  </div>
  <div class="swatch dark" style="background: oklch(0.62 0.11 164);">
    <span class="label">Primary Light</span>
    <span class="val">oklch(0.62 0.11 164)</span>
  </div>
  <div class="swatch light" style="background: #e7f4ee; border: 1px solid #d0e9db;">
    <span class="label">Primary Subtle</span>
    <span class="val">#e7f4ee</span>
  </div>
  <div class="swatch light" style="background: oklch(0.96 0.025 164 / 0.5); border: 1px solid #e0ede6;">
    <span class="label">Primary/5</span>
    <span class="val">primary at 5%</span>
  </div>
</div>
<div class="row">
  <div class="swatch light" style="background: oklch(0.52 0.11 164 / 0.1); border: 1px solid #d5e8e0;">
    <span class="label">Primary/10</span>
    <span class="val">icon bg</span>
  </div>
  <div class="swatch light" style="background: oklch(0.52 0.11 164 / 0.15); border: 1px solid #d0e6d9;">
    <span class="label">Primary/15</span>
    <span class="val">hero glow</span>
  </div>
  <div class="swatch light" style="background: oklch(0.52 0.11 164 / 0.2); border: 1px solid #c5e0d5;">
    <span class="label">Primary/20</span>
    <span class="val">hover state</span>
  </div>
  <div class="swatch dark" style="background: #145c47;">
    <span class="label">Primary Hover</span>
    <span class="val">~80% opacity</span>
  </div>
  <div class="swatch light" style="background: #fbfaf7; border: 1px solid #e8e6e0;">
    <span class="label">Background Warm</span>
    <span class="val">#fbfaf7</span>
  </div>
</div>
</body>
</html>
